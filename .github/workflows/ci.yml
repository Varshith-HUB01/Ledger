name: Ledger CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Verify Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Using a recent stable version

      - name: Verify API Build
        working-directory: ./api
        run: |
          go mod tidy
          go build -v ./...

      - name: Verify Worker Build
        working-directory: ./worker
        run: |
          go mod tidy
          go build -v ./...

      - name: Verify Docker Compose Build
        run: docker-compose build