events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS server resolves the 'api' hostname 
    # to all running containers for that service automatically.
    upstream ledger_api {
        server api:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://ledger_api;
            
            # Forward the real IP so our rate limiter still works!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}